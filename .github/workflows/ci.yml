name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./nevo_frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: nevo_frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

  server:
    name: Server — Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./nevo_server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: nevo_server/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

  contract:
    name: Contract — Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./nevo_contract
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            nevo_contract/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('nevo_contract/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build contract
        run: cargo build --release --target wasm32-unknown-unknown

      - name: Run tests
        run: cargo test --lib
