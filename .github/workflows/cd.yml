name: CD

on:
  push:
    branches: [main]

jobs:
  deploy-frontend:
    name: Deploy Frontend to Vercel
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./nevo_frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: nevo_frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Deploy to Vercel
        run: npx vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Frontend deployment failed. Check the logs above for details."
          echo "Branch: ${{ github.ref_name }}, Commit: ${{ github.sha }}, Actor: ${{ github.actor }}"

  deploy-server:
    name: Build Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./nevo_server
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: nevo_server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::Server build failed. Check the logs above for details."
          echo "Branch: ${{ github.ref_name }}, Commit: ${{ github.sha }}, Actor: ${{ github.actor }}"
